<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#151515"><meta name="apple-mobile-web-app-capable" content="yes"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icons/icon-180.png"><title>ORDINI D.ONE V18</title>
<style>
:root{--bg:#f2f2f7;--card:#fff;--ink:#171719;--muted:#7d7d84;--dark:#202022;--spirits:#96b59b;--vino:#d6b66f;--birra:#c98a58;--spezie:#9b78b5;--danger:#bd4f4b;--warn:#e2b64a}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{touch-action:manipulation}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;overscroll-behavior:none}button,input,select,textarea{font:inherit;font-size:16px}button{border:0}.hidden{display:none!important}.app{max-width:760px;margin:auto;min-height:100vh;padding-bottom:92px}header{position:sticky;top:0;z-index:20;background:rgba(242,242,247,.94);backdrop-filter:blur(18px);padding:calc(10px + env(safe-area-inset-top)) 16px 10px}.head{display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:10px;align-items:center}.logo{width:50px;height:32px;object-fit:contain}.brand b{font-size:18px}.user{background:var(--dark);color:#fff;border-radius:999px;padding:9px 13px;font-size:11px}main{padding:14px 16px 28px}h1{font-size:42px;letter-spacing:-.05em;margin:12px 0 20px}h2{font-size:28px;letter-spacing:-.035em;margin:0}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.back,.link{background:transparent;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}.grid{display:flex;flex-direction:column;gap:1px;border-radius:16px;overflow:hidden}.macro{width:100%;min-height:82px;border-radius:0;padding:18px 16px;text-align:left;font-size:27px;letter-spacing:-.035em;font-weight:700;display:flex;align-items:center;justify-content:space-between}.macro small{display:none}.macro .go{font-size:20px;opacity:.55;font-weight:400}.spirits{background:var(--spirits)}.vino{background:var(--vino)}.birra{background:var(--birra)}.spezie{background:var(--spezie);color:#fff}.card{background:var(--card);border-radius:16px;padding:16px;margin:10px 0}.card h3{margin:0 0 6px;font-size:18px}.muted{color:var(--muted);font-size:12px}.alert{background:#f5e6b9;border-left:5px solid var(--warn)}.danger{background:#f3d5d4}.row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:15px 0;border-bottom:1px solid #ececf0}.row:last-child{border-bottom:0}.btn{min-height:48px;border-radius:13px;background:var(--dark);color:#fff;padding:10px 16px;font-weight:700}.btn.secondary{background:#e7e7ec;color:var(--ink)}.btn.danger{background:#f1d2d1;color:var(--danger)}.tools{display:grid;grid-template-columns:1fr 150px;gap:8px;position:sticky;top:64px;z-index:10;background:var(--bg);padding:8px 0}.tools input,.tools select,.field input,.field select,.field textarea{width:100%;border:0;border-radius:12px;padding:13px;background:#fff;outline:0}.supplierline{display:flex;justify-content:space-between;align-items:center;padding:10px 0}.supplierline button{background:#ececf2;border-radius:10px;padding:9px 12px}.price{font-weight:700}.badge{display:inline-block;border-radius:999px;padding:5px 8px;background:#ececf2;font-size:10px;font-weight:700}.urgent{background:#f2c2bf;color:#8c2621}.attention{background:#f4dfaa;color:#76570b}.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(760px,100%);display:grid;grid-template-columns:repeat(4,1fr);background:rgba(255,255,255,.96);padding:8px 6px calc(8px + env(safe-area-inset-bottom));backdrop-filter:blur(18px);z-index:30}.bottom button{background:transparent;color:var(--muted);font-size:10px;padding:8px 2px}.bottom button.active{color:#000;font-weight:800}.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;display:flex;align-items:flex-end}.sheet{width:min(760px,100%);margin:auto;background:#fff;border-radius:22px 22px 0 0;padding:20px 16px calc(24px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto}.field{margin:12px 0}.field label{display:block;font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:700}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.wide{grid-column:1/-1}.orderline{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px 0;border-bottom:1px solid #eee}.totals{background:var(--dark);color:#fff;border-radius:16px;padding:16px;margin-top:14px}.empty{background:#fff;border-radius:16px;padding:24px;color:var(--muted)}.login{position:fixed;inset:0;background:#a8bab5;z-index:100;display:grid;place-items:center;padding:24px}.loginbox{text-align:center;width:min(350px,100%)}.loginbox img{width:170px;margin-bottom:42px}.loginbox input{width:220px;border:0;border-bottom:2px solid #555;background:transparent;text-align:center;font-size:30px;letter-spacing:8px;padding:12px}.loginbox .btn{display:block;margin:20px auto}.toast{position:fixed;bottom:105px;left:50%;transform:translateX(-50%);background:#111;color:#fff;border-radius:12px;padding:12px 16px;z-index:90;font-size:12px}.nozoom{touch-action:manipulation}@media(max-width:430px){.tools{grid-template-columns:1fr}.macro{min-height:78px;font-size:25px}}
</style></head><body>
<div id="login" class="login"><div class="loginbox"><img src="done-logo.png"><form id="loginForm"><input id="pin" inputmode="numeric" type="password" maxlength="8" placeholder="PIN"><button class="btn">Entra</button></form><div id="loginError" class="muted"></div></div></div>
<div class="app"><header><div class="head"><div class="brand"><img class="logo" src="done-logo.png"><div><b>Ordini</b><div class="muted">D.ONE V18</div></div></div><button id="profileBtn" class="user">Utente</button></div></header><main>
<section id="home"><h1>Ordini</h1><div id="syncLine" class="muted">Catalogo locale</div><div class="grid" id="macroGrid"></div><div id="homeAlerts"></div></section>
<section id="catalog" class="hidden"><div class="topbar"><div><h2 id="catalogTitle"></h2><div id="catalogMeta" class="muted"></div></div><button class="back" data-go="home">Home</button></div><div id="catalogTools"></div><div id="catalogList"></div></section>
<section id="cart" class="hidden"><div class="topbar"><div><h2>Ordine aperto</h2><div id="cartMeta" class="muted"></div></div><button class="back" data-go="home">Home</button></div><div id="cartList"></div><div id="cartTotals"></div><div class="actions"><button id="saveDraft" class="btn secondary">Salva bozza</button><button id="shareOrder" class="btn">Condividi</button><button id="archiveOrder" class="btn wide">Segna inviato e archivia</button></div></section>
<section id="production" class="hidden"><div class="topbar"><div><h2>Produzione</h2><div class="muted">Giacenze batch</div></div><button class="back" data-go="home">Home</button></div><div id="batchList"></div></section>
<section id="archive" class="hidden"><div class="topbar"><div><h2>Archivio</h2><div id="archiveMeta" class="muted"></div></div><button class="back" data-go="home">Home</button></div><div id="archiveList"></div></section>
<section id="profile" class="hidden"><div class="topbar"><div><h2>Profilo</h2><div id="profileMeta" class="muted"></div></div><button class="back" data-go="home">Home</button></div><div class="card"><h3 id="profileName"></h3><p id="profilePerms" class="muted"></p></div><div class="actions"><button id="syncBtn" class="btn secondary wide">Aggiorna dati</button><button id="logoutBtn" class="btn danger wide">Esci</button></div></section>
</main><nav class="bottom"><button data-nav="home" class="active">Home</button><button data-nav="cart">Ordine</button><button data-nav="production">Produzione</button><button data-nav="archive">Archivio</button></nav></div>
<div id="itemModal" class="modal hidden"><div class="sheet"><div class="topbar"><h2 id="itemTitle"></h2><button id="closeItem" class="back">Chiudi</button></div><div id="itemOptions"></div></div></div><div id="toast" class="toast hidden"></div>
<script>
const API_URL=localStorage.getItem('done-api-url')||'https://script.google.com/macros/s/AKfycbwguLOUwvP7cOogE30RZHtBfH-ryl0F9gudS4Lnqtwov062yJWyUzgT96ABnEg-vJGc/exec';
const $=id=>document.getElementById(id), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let user=null,pin='',catalog=[],materials=[],batches=[],orders=[],cart=[],activeMacro='';
const screens=['home','catalog','cart','production','archive','profile'];
function truth(v){return ['SI','SÌ','TRUE','VERO','1','YES'].includes(String(v??'').trim().toUpperCase())}
function show(id){screens.forEach(x=>$(x).classList.toggle('hidden',x!==id));document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('active',b.dataset.nav===id));if(id==='home')renderHome();if(id==='cart')renderCart();if(id==='production')renderBatches();if(id==='archive')renderArchive()}
function toast(t){$('toast').textContent=t;$('toast').classList.remove('hidden');setTimeout(()=>$('toast').classList.add('hidden'),1800)}
async function apiGet(action,extra={}){const q=new URLSearchParams({action,pin,...extra,_:Date.now()});const r=await fetch(`${API_URL}?${q}`,{cache:'no-store'});return r.json()}
async function apiPost(body){const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({...body,pin})});return r.json()}
function saveLocal(){localStorage.setItem('done-v18-data',JSON.stringify({catalog,materials,batches,orders,cart,updatedAt:new Date().toISOString()}))}
function loadLocal(){try{const d=JSON.parse(localStorage.getItem('done-v18-data')||'{}');catalog=d.catalog||[];materials=d.materials||[];batches=d.batches||[];orders=d.orders||[];cart=d.cart||[]}catch(e){}}
async function login(e){e.preventDefault();pin=$('pin').value.trim();if(!pin)return;try{const d=await apiGet('ordini');if(!d.ok)throw Error(d.errore||'Accesso negato');user=d.utente;localStorage.setItem('done-v18-session',JSON.stringify({user,pin}));$('login').classList.add('hidden');applyUser();loadLocal();await syncAll(false);show('home')}catch(err){$('loginError').textContent=err.message}}
function applyUser(){$('profileBtn').textContent=user.nome;$('profileName').textContent=user.nome;$('profileMeta').textContent=user.ruolo;$('profilePerms').textContent=`Modifica batch: ${user.modificaBatch?'SI':'NO'} · Vede prezzi: ${user.vedePrezzi?'SI':'NO'}`}
async function syncAll(silent=true){try{const d=await apiGet('bootstrap');if(!d.ok)throw Error(d.errore);catalog=d.catalogo||[];materials=d.materiePrime||[];batches=d.batches||[];orders=d.ordini||orders;saveLocal();$('syncLine').textContent=`Aggiornato ${new Date().toLocaleString('it-IT')}`;if(!silent)toast('Dati aggiornati')}catch(e){loadLocal();$('syncLine').textContent='Modalità locale';if(!silent)toast('Uso dati locali')}}
const macroInfo={SPIRITS:['spirits',''],VINO:['vino',''],BIRRA:['birra',''],SPEZIE:['spezie','']};
function renderHome(){$('macroGrid').innerHTML=Object.entries(macroInfo).map(([m,[c,s]])=>`<button class="macro ${c}" data-macro="${m}">${m}<small>${s}</small></button>`).join('');document.querySelectorAll('[data-macro]').forEach(b=>b.onclick=()=>openMacro(b.dataset.macro));const urgent=[...new Map(materials.filter(x=>['SI','URGENTE','ATTENZIONE'].includes(String(x.urgenza).toUpperCase())).map(x=>[x.nome.toLowerCase(),x])).values()];const low=batches.filter(x=>Number(x.disponibili)<=2);$('homeAlerts').innerHTML=`<div class="card ${urgent.length?'alert':''}" id="urgentCard"><h3>SPEZIE URGENTI · ${urgent.length}</h3><div class="muted">${urgent.slice(0,5).map(x=>esc(x.nome)).join(' · ')||'Nessuna urgenza'}</div></div><div class="card ${low.length?'danger':''}"><h3>BATCH DA CONTROLLARE · ${low.length}</h3><div class="muted">${low.slice(0,5).map(x=>esc(x.batch)).join(' · ')||'Nessuna criticità'}</div></div><div class="card"><h3>ORDINI APERTI · ${orders.filter(o=>o.stato!=='INVIATO').length}</h3><div class="muted">Bozze e ordini non ancora inviati</div></div>`;$('urgentCard').onclick=()=>openMacro('SPEZIE',true)}
function openMacro(m,urgentOnly=false){activeMacro=m;$('catalogTitle').textContent=m;if(m==='SPEZIE'){renderMaterials(urgentOnly)}else renderProducts(m);show('catalog')}
function renderProducts(m){const rows=catalog.filter(x=>String(x.macrocategoria||'').toUpperCase().includes(m==='VINO'?'VINO':m==='BIRRA'?'BIR':m));$('catalogMeta').textContent=`${rows.length} prodotti`;$('catalogTools').innerHTML=`<div class="tools"><input id="prodSearch" placeholder="Cerca prodotto"></div>`;const draw=()=>{$('catalogList').innerHTML=rows.filter(x=>!$('prodSearch').value||String(x.prodotto||x.nome).toLowerCase().includes($('prodSearch').value.toLowerCase())).map((x,i)=>`<div class="card row"><div><h3>${esc(x.prodotto||x.nome)}</h3><div class="muted">${esc(x.sottocategoria||'')} ${user.vedePrezzi&&x.prezzo?'· € '+Number(x.prezzo).toFixed(2):''}</div></div><button class="btn" data-addprod="${i}">+</button></div>`).join('')||'<div class="empty">Nessun prodotto</div>';document.querySelectorAll('[data-addprod]').forEach(b=>b.onclick=()=>addStandard(rows[+b.dataset.addprod]))};$('prodSearch').oninput=draw;draw()}
function addStandard(x){const key=[x.macrocategoria,x.sottocategoria,x.prodotto,x.formato].join('|');let it=cart.find(y=>y.key===key);if(it)it.quantita++;else cart.push({key,tipo:'CATALOGO',nome:x.prodotto||x.nome,fornitore:x.fornitore||x.macrocategoria,um:x.formato||'pz',quantita:1,prezzo:user.vedePrezzi?Number(x.prezzo||0):undefined,macro:activeMacro});saveLocal();toast('Aggiunto')}
function renderMaterials(urgentOnly=false){let supplier='Tutti',search='';const suppliers=['Tutti',...new Set(materials.map(x=>x.fornitore).filter(Boolean))].sort();$('catalogTools').innerHTML=`<div class="tools"><input id="matSearch" placeholder="Cerca materia prima"><select id="supplierFilter">${suppliers.map(s=>`<option>${esc(s)}</option>`).join('')}</select></div>`;const draw=()=>{search=$('matSearch').value.toLowerCase();supplier=$('supplierFilter').value;let rows=materials.filter(x=>(!urgentOnly||['SI','URGENTE','ATTENZIONE'].includes(String(x.urgenza).toUpperCase()))&&(!search||x.nome.toLowerCase().includes(search))&&(supplier==='Tutti'||x.fornitore===supplier));const groups={};rows.forEach(x=>(groups[x.nome]??=[]).push(x));$('catalogMeta').textContent=`${Object.keys(groups).length} materie prime`;$('catalogList').innerHTML=Object.entries(groups).map(([name,opts])=>`<div class="card"><h3>${esc(name)} ${urgBadge(opts[0].urgenza)}</h3>${opts.map((x,i)=>`<div class="supplierline"><div>${esc(x.fornitore)} ${user.vedePrezzi?`<span class="price">· € ${Number(x.prezzo||0).toFixed(2)}/${esc(x.um)}</span>`:''}</div><button data-mat="${materials.indexOf(x)}">Ordina</button></div>`).join('')}</div>`).join('')||'<div class="empty">Nessun risultato</div>';document.querySelectorAll('[data-mat]').forEach(b=>b.onclick=()=>openMaterial(materials[+b.dataset.mat]))};$('matSearch').oninput=draw;$('supplierFilter').onchange=draw;draw()}
function urgBadge(v){v=String(v||'').toUpperCase();return ['SI','URGENTE'].includes(v)?'<span class="badge urgent">URGENTE</span>':v==='ATTENZIONE'?'<span class="badge attention">ATTENZIONE</span>':''}
function openMaterial(x){$('itemTitle').textContent=x.nome;$('itemOptions').innerHTML=`<div class="field"><label>Fornitore</label><input value="${esc(x.fornitore)}" disabled></div><div class="field"><label>Quantità (${esc(x.um)})</label><input id="matQty" type="number" min="0.01" step="any" value="1"></div>${user.vedePrezzi?`<div class="card">Prezzo: € ${Number(x.prezzo||0).toFixed(2)} / ${esc(x.um)}</div>`:''}<button id="addMaterial" class="btn wide">Aggiungi all’ordine</button>`;$('itemModal').classList.remove('hidden');$('addMaterial').onclick=()=>{const q=Number($('matQty').value);if(!(q>0))return;const key=`MAT|${x.nome}|${x.fornitore}|${x.um}`;let it=cart.find(y=>y.key===key);if(it)it.quantita+=q;else cart.push({key,tipo:'SPEZIE',nome:x.nome,fornitore:x.fornitore,um:x.um,quantita:q,prezzo:user.vedePrezzi?Number(x.prezzo||0):undefined,macro:'SPEZIE'});saveLocal();$('itemModal').classList.add('hidden');toast('Aggiunto')}}
function renderCart(){const total=cart.reduce((s,x)=>s+(Number(x.prezzo||0)*Number(x.quantita||0)),0);$('cartMeta').textContent=`${cart.length} articoli`;$('cartList').innerHTML=cart.length?cart.map((x,i)=>`<div class="card orderline"><div><h3>${esc(x.nome)}</h3><div class="muted">${esc(x.fornitore)} · ${x.quantita} ${esc(x.um)} ${user.vedePrezzi&&x.prezzo!==undefined?`· € ${(x.prezzo*x.quantita).toFixed(2)}`:''}</div></div><button class="btn danger" data-remove="${i}">×</button></div>`).join(''):'<div class="empty">Ordine vuoto</div>';document.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{cart.splice(+b.dataset.remove,1);saveLocal();renderCart()});$('cartTotals').innerHTML=user.vedePrezzi&&cart.length?`<div class="totals">Totale stimato<br><b style="font-size:25px">€ ${total.toFixed(2)}</b></div>`:''}
function orderText(){const groups={};cart.forEach(x=>(groups[x.fornitore]??=[]).push(x));let t=`ORDINE D.ONE\nOperatore: ${user.nome}\nData: ${new Date().toLocaleDateString('it-IT')}\n`;Object.entries(groups).forEach(([s,items])=>{t+=`\n${s.toUpperCase()}\n`;items.forEach(x=>t+=`${x.nome} — ${x.quantita} ${x.um}${user.vedePrezzi&&x.prezzo!==undefined?` — € ${(x.prezzo*x.quantita).toFixed(2)}`:''}\n`);if(user.vedePrezzi)t+=`Totale ${s}: € ${items.reduce((a,x)=>a+(x.prezzo||0)*x.quantita,0).toFixed(2)}\n`});if(user.vedePrezzi)t+=`\nTotale ordine: € ${cart.reduce((a,x)=>a+(x.prezzo||0)*x.quantita,0).toFixed(2)}\n`;return t}
async function persistOrder(stato){if(!cart.length)return toast('Ordine vuoto');const o={id:'ORD-'+Date.now(),data:new Date().toISOString(),operatore:user.nome,stato,macrocategoria:activeMacro||'MISTO',prodotti:JSON.parse(JSON.stringify(cart)),testo:orderText()};orders.unshift(o);saveLocal();try{await apiPost({action:'salvaOrdine',ordine:o})}catch(e){}toast(stato==='INVIATO'?'Archiviato':'Bozza salvata');if(stato==='INVIATO')cart=[];saveLocal();renderCart()}
async function share(){const text=orderText();if(navigator.share)await navigator.share({title:'Ordine D.ONE',text}).catch(()=>{});else await navigator.clipboard.writeText(text);toast('Ordine condiviso')}
function renderBatches(){$('batchList').innerHTML=batches.length?batches.map((x,i)=>`<div class="card row"><div><h3>${esc(x.batch)}</h3><div class="muted">Disponibili: ${x.disponibili} · ${esc(x.operatore||'')} · ${esc(x.ultimoAggiornamento||'')}</div></div>${user.modificaBatch?`<button class="btn" data-batch="${i}">Modifica</button>`:''}</div>`).join(''):'<div class="empty">Nessun batch</div>';document.querySelectorAll('[data-batch]').forEach(b=>b.onclick=()=>editBatch(+b.dataset.batch))}
async function editBatch(i){const x=batches[i],v=prompt(`Nuova disponibilità per ${x.batch}`,x.disponibili);if(v===null||isNaN(Number(v)))return;try{const d=await apiPost({action:'aggiornaBatch',batch:x.batch,disponibili:Number(v)});if(!d.ok)throw Error(d.errore);x.disponibili=Number(v);x.operatore=user.nome;x.ultimoAggiornamento=new Date().toLocaleString('it-IT');saveLocal();renderBatches();toast('Batch aggiornato')}catch(e){toast(e.message)}}
function renderArchive(){const list=orders;$('archiveMeta').textContent=`${list.length} ordini`;$('archiveList').innerHTML=list.length?list.map((o,i)=>`<div class="card"><h3>${esc(o.macrocategoria)} · ${esc(o.stato)}</h3><div class="muted">${new Date(o.data).toLocaleString('it-IT')} · ${esc(o.operatore)}</div><div class="actions" style="margin-top:12px"><button class="btn secondary" data-openord="${i}">Apri</button><button class="btn secondary" data-dup="${i}">Duplica</button><button class="btn danger wide" data-del="${i}">Elimina</button></div></div>`).join(''):'<div class="empty">Archivio vuoto</div>';document.querySelectorAll('[data-openord]').forEach(b=>b.onclick=()=>{cart=JSON.parse(JSON.stringify(list[+b.dataset.openord].prodotti||[]));saveLocal();show('cart')});document.querySelectorAll('[data-dup]').forEach(b=>b.onclick=()=>{cart=JSON.parse(JSON.stringify(list[+b.dataset.dup].prodotti||[]));saveLocal();toast('Ordine duplicato');show('cart')});document.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{const o=list[+b.dataset.del];if(!confirm('Eliminare ordine?'))return;orders=orders.filter(x=>x.id!==o.id);saveLocal();try{await apiPost({action:'eliminaOrdine',id:o.id})}catch(e){}renderArchive()})}
document.addEventListener('click',e=>{const g=e.target.closest('[data-go]');if(g)show(g.dataset.go);const n=e.target.closest('[data-nav]');if(n)show(n.dataset.nav)});$('loginForm').onsubmit=login;$('closeItem').onclick=()=>$('itemModal').classList.add('hidden');$('profileBtn').onclick=()=>show('profile');$('saveDraft').onclick=()=>persistOrder('BOZZA');$('archiveOrder').onclick=()=>persistOrder('INVIATO');$('shareOrder').onclick=share;$('syncBtn').onclick=()=>syncAll(false);$('logoutBtn').onclick=()=>{localStorage.removeItem('done-v18-session');location.reload()};
(async()=>{loadLocal();try{const s=JSON.parse(localStorage.getItem('done-v18-session')||'null');if(s){user=s.user;pin=s.pin;applyUser();$('login').classList.add('hidden');await syncAll(true);show('home')}}catch(e){}})();
</script></body></html>
